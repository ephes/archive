<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Archive{% endblock %}</title>
    <link rel="alternate" type="application/rss+xml" title="Archive RSS feed" href="{% url 'archive:rss-feed' %}">
    <link rel="alternate" type="application/rss+xml" title="Archive podcast feed" href="{% url 'archive:podcast-feed' %}">
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f0e6;
            --card: rgba(255, 251, 245, 0.88);
            --ink: #1f1b17;
            --muted: #675f56;
            --line: rgba(31, 27, 23, 0.14);
            --accent: #9f3529;
            --accent-soft: rgba(159, 53, 41, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Iowan Old Style", "Palatino Linotype", serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(159, 53, 41, 0.1), transparent 28rem),
                linear-gradient(180deg, #f8f4ec 0%, var(--bg) 100%);
        }

        a {
            color: var(--accent);
        }

        .shell {
            width: min(72rem, calc(100vw - 2rem));
            margin: 0 auto;
            padding: 2rem 0 4rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: baseline;
            margin-bottom: 2rem;
        }

        .header-actions {
            display: grid;
            gap: 0.75rem;
            justify-items: end;
        }

        header h1,
        h2,
        h3 {
            margin: 0;
        }

        .kicker,
        .meta,
        nav {
            color: var(--muted);
        }

        .hero {
            padding: 1.5rem;
            border: 1px solid var(--line);
            border-radius: 1.5rem;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.5), var(--card));
            box-shadow: 0 1rem 3rem rgba(88, 66, 46, 0.08);
        }

        .cards {
            display: grid;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .card,
        .detail,
        .form-card,
        .empty {
            padding: 1.25rem;
            border: 1px solid var(--line);
            border-radius: 1.25rem;
            background: var(--card);
            box-shadow: 0 0.5rem 2rem rgba(88, 66, 46, 0.06);
        }

        .card-title {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .content-block + .content-block {
            margin-top: 1rem;
        }

        .pill {
            display: inline-flex;
            padding: 0.25rem 0.6rem;
            border-radius: 999px;
            background: var(--accent-soft);
            font-size: 0.88rem;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .tag-list li {
            padding: 0.25rem 0.6rem;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.6);
        }

        .nav-row {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .search-form {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .search-form input {
            min-width: min(18rem, 50vw);
            margin: 0;
        }

        .search-form button {
            padding: 0.75rem 1rem;
            white-space: nowrap;
        }

        .search-meta {
            margin-top: 1rem;
        }

        .copy-button {
            border: 1px solid var(--line);
            padding: 0.4rem 0.75rem;
            color: var(--accent);
            background: rgba(255, 255, 255, 0.65);
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        form p {
            display: grid;
            gap: 0.35rem;
            margin-bottom: 1rem;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 0.75rem 0.9rem;
            border: 1px solid var(--line);
            border-radius: 0.9rem;
            font: inherit;
            background: rgba(255, 255, 255, 0.82);
        }

        button {
            border: 0;
            border-radius: 999px;
            padding: 0.8rem 1.2rem;
            font: inherit;
            color: #fffaf4;
            background: var(--accent);
            cursor: pointer;
        }

        audio {
            width: 100%;
            margin-top: 1rem;
        }

        @media (max-width: 640px) {
            header {
                flex-direction: column;
            }

            .header-actions {
                width: 100%;
                justify-items: stretch;
            }

            .nav-row {
                flex-direction: column;
            }

            .search-form {
                flex-direction: column;
                align-items: stretch;
            }

            .search-form input {
                min-width: 0;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header>
            <div>
                <p class="kicker">Public archive of links, episodes, and videos</p>
                <h1><a href="{% url 'archive:overview' %}">Archive</a></h1>
            </div>
            <div class="header-actions">
                <nav>
                    <a href="{% url 'archive:rss-feed' %}">RSS</a>
                    ·
                    <a href="{% url 'archive:podcast-feed' %}">Podcast feed</a>
                    ·
                    <button
                        type="button"
                        class="copy-button"
                        data-copy-path="{% url 'archive:podcast-feed' %}"
                        data-default-label="Copy podcast URL"
                        data-success-label="Copied"
                    >
                        Copy podcast URL
                    </button>
                    ·
                    {% if request.user.is_authenticated %}
                        <a href="{% url 'archive:item-new' %}">Capture manually</a>
                        ·
                        <a href="{% url 'admin:index' %}">Admin</a>
                    {% else %}
                        <a href="{% url 'archive:login' %}">Editor login</a>
                    {% endif %}
                </nav>
                <form class="search-form" action="{% url 'archive:search' %}" method="get">
                    <label class="sr-only" for="site-search">Search archive</label>
                    <input
                        id="site-search"
                        type="search"
                        name="q"
                        value="{{ search_query|default:'' }}"
                        placeholder="Search title, summaries, notes, transcript"
                    >
                    <button type="submit">Search</button>
                </form>
            </div>
        </header>
        {% block content %}{% endblock %}
    </div>
    <script>
        for (const button of document.querySelectorAll("[data-copy-path]")) {
            button.addEventListener("click", async () => {
                const podcastUrl = new URL(button.dataset.copyPath, window.location.origin).href;
                const defaultLabel = button.dataset.defaultLabel || "Copy";
                const successLabel = button.dataset.successLabel || "Copied";

                try {
                    await navigator.clipboard.writeText(podcastUrl);
                    button.textContent = successLabel;
                    window.setTimeout(() => {
                        button.textContent = defaultLabel;
                    }, 1500);
                } catch {
                    window.prompt("Copy podcast URL:", podcastUrl);
                }
            });
        }
    </script>
</body>
</html>
